default_stages: [pre-commit, pre-push]
default_language_version:
  python: python3.13
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
    - id: flake8
      args: [
        "--max-line-length=120",
        "."
      ]
      types: ['python']
  -   repo: local
      hooks:
      -   id: pylint
          name: pylint
          entry: .venv/bin/python -m pylint
          language: system
          types: [python]
          args: ["-rn", "-sn"]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [
          "-r",
          "."
        ]
